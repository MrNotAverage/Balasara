# Render deployment configuration — Multi-Tenant SaaS
services:
  - type: web
    name: balasara-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        value: file:./dev.db
      - key: FRONTEND_URL
        value: https://balasara.vercel.app
      - key: GEMINI_API_KEY
        value: placeholder_for_now
      - key: JWT_SECRET
        value: placeholder_change_this_to_a_random_string

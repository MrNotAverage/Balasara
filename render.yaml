# Render deployment configuration
services:
  - type: web
    name: balasara-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: WABA_VERIFY_TOKEN
        value: balasara_secret
      - key: FRONTEND_URL
        value: https://balasara.vercel.app
      - key: WABA_ACCESS_TOKEN
        value: placeholder_for_now
      - key: WABA_PHONE_ID
        value: placeholder_for_now
      - key: WABA_APP_SECRET
        value: placeholder_for_now
      - key: OPENAI_API_KEY
        value: placeholder_for_now
